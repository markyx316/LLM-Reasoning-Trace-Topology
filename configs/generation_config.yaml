# =============================================================================
# Trace Generation Configuration
# =============================================================================
# This config documents all parameters. The CLI flags in generate_traces.py
# override these values — this file serves as reference and defaults.

# --- Models ---
models:
  # DeepSeek API (full R1 model, pay-as-you-go)
  deepseek-r1:
    short_name: "deepseek-r1"
    display_name: "DeepSeek-R1"
    backend: "api"
    api_model: "deepseek-reasoner"
    base_url: "https://api.deepseek.com"
    supports_temperature: false  # Reasoner uses internal parameters
    notes: "Full R1 model. Best quality. ~$2.19/1M output tokens."

  # Distilled models (run on HPC GPUs)
  r1-distill-qwen-7b:
    short_name: "r1-distill-qwen-7b"
    display_name: "R1-Distill-Qwen-7B"
    hf_model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
    backend: "hf"
    gpu_memory: "16GB"           # Fits on single 24GB GPU
    supports_temperature: true
    notes: "Primary evaluation model. Open weights, MIT license."

  r1-distill-llama-8b:
    short_name: "r1-distill-llama-8b"
    display_name: "R1-Distill-Llama-8B"
    hf_model: "deepseek-ai/DeepSeek-R1-Distill-Llama-8B"
    backend: "hf"
    gpu_memory: "18GB"
    supports_temperature: true
    notes: "Cross-model transfer experiments. Different architecture family."

# --- Generation Parameters ---
generation:
  primary:
    temperature: 0.6             # DeepSeek recommended for reasoning
    top_p: 0.95
    max_tokens: 32768
    delay_between_requests: 0.5  # Seconds (API only, rate limit protection)

  self_consistency:
    temperature: 0.8             # Higher for diversity
    top_p: 0.95
    max_tokens: 32768
    num_samples: 8               # Reduce to 4 if budget-constrained
    delay_between_requests: 0.3

# --- Checkpointing ---
checkpointing:
  interval: 10                   # Save every N items (API) or 50 (HPC)
  resume: true                   # Auto-resume from last checkpoint

# --- Output ---
output:
  base_dir: "data/traces"
  format: "jsonl"

  # Record schema (all fields present in every record):
  # --- Item Info ---
  #   item_id, dataset, problem, prompt, ground_truth,
  #   answer_type, answer_extraction, metadata
  # --- Generation Results ---
  #   full_response, reasoning_trace, answer_text,
  #   trace_token_count, trace_length, total_generated_tokens,
  #   prompt_tokens, reasoning_tokens,
  #   generation_time_seconds, mean_log_prob
  # --- Scoring Results ---
  #   is_correct, extracted_answer, comparison_method
  # --- Run Metadata ---
  #   model_name, model_short_name, backend, temperature, timestamp

# --- HPC Configuration ---
hpc:
  partition: "gpu"
  gpu_type: "a100"               # a100, v100, a6000
  time_per_dataset: "12:00:00"
  time_sc: "24:00:00"
  memory: "64G"
  cpus: 8
  conda_env: "trace-uq"

# --- Cost Estimates (DeepSeek API) ---
cost_estimates:
  # Per-dataset estimates at ~2000 tokens/trace average
  math500:    "$0.60"            # 500 items × ~2000 output tokens
  gsm8k:      "$1.60"            # 1319 items
  gpqa:       "$0.25"            # 198 items
  arc:        "$1.40"            # 1172 items
  total_primary: "~$4.00"
  sc_math500: "~$5.00"           # 500 × 8 samples
  sc_gpqa:    "~$2.00"           # 198 × 8 samples
  grand_total: "~$11.00"
